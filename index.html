<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>MUSEIC | Private Listening</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #080808;
      color: #f4f1eb;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(100%, 420px);
      text-align: center;
    }

    .brand {
      margin-bottom: 42px;
      font-size: 0.78rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      opacity: 0.72;
    }

    h1 {
      margin: 0 0 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 9vw, 3.8rem);
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 auto 34px;
      max-width: 330px;
      color: #aaa59d;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .status {
      margin-top: 26px;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <main>
    <div class="brand">MUSEIC</div>

    <h1>Private Listening</h1>

    <p>
      A private artist experience is being prepared.
    </p>

    <div class="status">Access page coming next</div>
  </main>
</body>
</html>
