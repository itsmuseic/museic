<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MUSEIC | Music</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#090909;
color:#f4efe8;
font-family:Arial,Helvetica,sans-serif;

}

.container{

width:min(900px,92%);
margin:auto;
padding:70px 0;

}

h1{

font-size:52px;
margin-bottom:10px;

}

.subtitle{

opacity:.65;
margin-bottom:60px;
letter-spacing:1px;

}

.song{

border:1px solid rgba(255,255,255,.08);

padding:30px;

margin-bottom:25px;

border-radius:18px;

background:#111;

}

.song h2{

margin-bottom:8px;

}

.status{

display:inline-block;

padding:6px 12px;

border-radius:30px;

font-size:13px;

margin-bottom:18px;

background:#222;

}

.buttons{

display:flex;

gap:15px;

margin-top:20px;

flex-wrap:wrap;

}

a{

text-decoration:none;

color:white;

}

.btn{

padding:12px 22px;

border-radius:12px;

background:#d7c2a2;

color:#111;

font-weight:bold;

}

.btn.secondary{

background:#2a2a2a;

color:white;

}

</style>

</head>
