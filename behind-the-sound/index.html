<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />

  <title>MUSEIC | Behind the Sound</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #090909;
      color: #f4efe7;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      width: min(1100px, 92%);
      margin: auto;
      padding: 70px 0;
    }

    .brand {
      margin-bottom: 34px;
      font-size: 0.75rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      opacity: 0.68;
    }

    h1 {
      margin: 0 0 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 400;
      line-height: 1;
    }

    .subtitle {
      max-width: 650px;
      margin: 0 0 42px;
      color: #aaa59d;
      line-height: 1.7;
    }

    .video-card {
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 22px;
      background: #111;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      overflow: hidden;
      border-radius: 14px;
      background: #050505;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .note {
      margin: 26px 4px 0;
      color: #8f8a83;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .navigation {
      margin-top: 40px;
    }

    .button {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 12px;
      background: #e7ded1;
      color: #111;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    @media (max-width: 600px) {
      .container {
        padding: 45px 0;
      }

      .video-card {
        padding: 8px;
        border-radius: 16px;
      }

      .video-wrapper {
        border-radius: 10px;
      }
    }
  </style>
</head>

<body>
  <main class="container">

    <div class="brand">MUSEIC</div>

    <h1>Behind the Sound</h1>

    <p class="subtitle">
      A glimpse into the writing, recording and production process behind the music.
    </p>

    <section class="video-card">
      <div class="video-wrapper">

        <iframe
          src="https://www.youtube-nocookie.com/embed/E0lV5ZslYZA"
          title="MUSEIC — Behind the Sound"
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>

      </div>
    </section>

    <p class="note">
      Unreleased material presented exclusively for private review.
    </p>

    <nav class="navigation">
      <a class="button" href="museic.html">PRIVATE LISTENING</a>
    </nav>

  </main>
</body>
</html>
